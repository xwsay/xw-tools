<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="page-title">美区免税州地址生成器 | 小闻说</title>
    <style>
        :root {
            --bg-color: #fbfbfd;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.05);
            --card-bg: rgba(255, 255, 255, 0.5);
            --card-hover: #ffffff;
            --shadow-sm: 0 4px 6px -1px rgba(0,0,0,0.05);
            --accent: #0071e3;
            --glow-1: #e0eaff;
            --glow-2: #fce7f3;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --text-primary: #f5f5f7;
                --text-secondary: #a1a1a6;
                --glass-bg: rgba(28, 28, 30, 0.6);
                --glass-border: rgba(255, 255, 255, 0.08);
                --card-bg: rgba(44, 44, 46, 0.4);
                --card-hover: rgba(58, 58, 60, 0.8);
                --accent: #2997ff;
                --glow-1: #1a2342;
                --glow-2: #38192a;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif; 
            background-color: transparent; 
            color: var(--text-primary); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 5px 0;
            position: relative;
        }

        .ambient-bg { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: radial-gradient(circle at 20% 30%, var(--glow-1) 0%, transparent 50%), 
                        radial-gradient(circle at 80% 70%, var(--glow-2) 0%, transparent 50%); 
            filter: blur(80px); opacity: 0.8; z-index: -1; pointer-events: none; 
        }

        .glass-container { 
            width: 100%; max-width: 480px; 
            background: var(--glass-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border); border-radius: 20px; 
            padding: 1.25rem 1.1rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.08);
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
            position: relative;
        }
        @keyframes slideUpFade { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        h2 { text-align: center; margin: 0 0 4px 0; font-size: 1.15rem; font-weight: 600; }
        .brand-subtitle { text-align: center; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 12px; }
        .brand-subtitle a { color: var(--text-primary); text-decoration: none; font-weight: 600; }

        button.generate-btn { 
            width: 100%; padding: 12px; font-size: 0.95rem; font-weight: 600; 
            background: var(--text-primary); color: var(--bg-color); 
            border: none; border-radius: 12px; cursor: pointer; margin-bottom: 12px; 
            transition: all 0.2s; box-shadow: var(--shadow-sm);
        }
        button.generate-btn:hover { transform: translateY(-1px); opacity: 0.9; }

        .info-list { display: flex; flex-direction: column; gap: 8px; }
        .info-row { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 10px 12px; background: var(--card-bg); 
            border-radius: 12px; border: 1px solid var(--glass-border); 
        }
        .info-content { display: flex; flex-direction: column; flex: 1; overflow: hidden; padding-right: 8px; }
        .label { font-size: 0.65rem; color: var(--text-secondary); margin-bottom: 2px; font-weight: 500; text-transform: uppercase; }
        .value { font-size: 0.95rem; color: var(--text-primary); font-weight: 600; }
        
        .copy-btn { 
            padding: 5px 12px; font-size: 0.78rem; font-weight: 600; 
            background: var(--bg-color); color: var(--text-primary);
            border: 1px solid var(--glass-border); border-radius: 99px; 
            cursor: pointer; transition: all 0.2s;
        }
        .copy-btn:hover { background: var(--text-primary); color: var(--bg-color); }
        .copy-btn.copied { background: #34c759; border-color: #34c759; color: white; }

        .cta-card {
            margin-top: 14px; padding: 0.85rem;
            background: rgba(0, 113, 227, 0.05); border: 1px dashed var(--accent);
            border-radius: 14px; text-decoration: none; display: block;
            transition: all 0.3s ease; text-align: center;
        }
        @media (prefers-color-scheme: dark) {
            .cta-card { background: rgba(41, 151, 255, 0.1); border-color: rgba(41, 151, 255, 0.4); }
        }
        .cta-card:hover { background: rgba(0, 113, 227, 0.1); transform: translateY(-1px); border-style: solid; }
        .cta-text { font-size: 0.85rem; font-weight: 600; color: var(--accent); line-height: 1.4; }

        /* 🚀 自定义确认模态框样式 */
        .modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.25); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: all 0.2s ease; z-index: 100;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-box {
            background: var(--bg-color); border: 1px solid var(--glass-border);
            border-radius: 16px; padding: 1.2rem; width: 85%; max-width: 320px;
            text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            transform: scale(0.9); transition: all 0.2s ease;
        }
        .modal-overlay.active .modal-box { transform: scale(1); }
        .modal-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 8px; color: var(--text-primary); }
        .modal-desc { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 16px; line-height: 1.4; }
        .modal-actions { display: flex; gap: 8px; }
        .modal-btn {
            flex: 1; padding: 8px; font-size: 0.85rem; font-weight: 600; border-radius: 10px;
            border: 1px solid var(--glass-border); cursor: pointer; transition: all 0.2s;
        }
        .modal-btn-cancel { background: var(--card-bg); color: var(--text-primary); }
        .modal-btn-confirm { background: var(--text-primary); color: var(--bg-color); border: none; }
    </style>
</head>
<body>
    <script>
        // ==================== 🚀 专属配置区（经常变动的内容集中于此） ====================
        const siteConfig = {
            // 网页基础配置
            pageTitle: "美区免税州地址生成器 | 小闻说",
            brandName: "小闻说",
            homeUrl: "https://www.xwsay.com",
            
            // 再次生成时的二次确认文案
            confirmTitle: "重新生成地址？",
            confirmText: "生成新地址后，当前显示的地址信息将被覆盖。",
            btnConfirmText: "确定生成",
            btnCancelText: "取消",

            // 底部引导卡片配置
            ctaLink: "https://docs.xwsay.com/article/us-apple-id-guide",
            ctaHtml: "👉 拿到地址了？点击查看<br>《5分钟零门槛美区 Apple ID 注册保姆级教程》",

            // 名字与街道词库
            firstNames: ["James", "John", "Robert", "Michael", "William", "David", "Mary", "Patricia", "Jennifer", "Linda"],
            lastNames: ["Smith", "Johnson", "Williams", "Brown", "Jones", "Garcia", "Miller", "Davis", "Rodriguez"],
            streetNames: ["Oak St", "Pine St", "Maple Ave", "Cedar Ln", "Elm St", "Washington Blvd"],

            // 免税州及城市邮编池
            taxFreeStates: [
                { state: "DE", stateName: "Delaware", cities: [{name: "Wilmington", zip: "19801"}, {name: "Newark", zip: "19711"}] },
                { state: "OR", stateName: "Oregon", cities: [{name: "Portland", zip: "97204"}, {name: "Salem", zip: "97301"}] },
                { state: "MT", stateName: "Montana", cities: [{name: "Billings", zip: "59101"}, {name: "Missoula", zip: "59801"}] },
                { state: "NH", stateName: "New Hampshire", cities: [{name: "Manchester", zip: "03101"}, {name: "Nashua", zip: "03060"}] },
                { state: "AK", stateName: "Alaska", cities: [{name: "Anchorage", zip: "99501"}, {name: "Fairbanks", zip: "99701"}] }
            ]
        };
        // ==============================================================================
    </script>

    <div class="ambient-bg"></div>

    <div class="glass-container">
        <h2 id="main-heading">🇺🇸 美区免税州地址生成器</h2>
        <div class="brand-subtitle"><a href="" id="brand-link" target="_blank">小闻说</a> 专属工具</div>
        <button class="generate-btn" onclick="handleGenerateClick()">一键生成新地址</button>
        
        <div id="output" class="info-list"></div>

        <a href="" target="_blank" id="cta-card-link" class="cta-card">
            <div class="cta-text" id="cta-card-text"></div>
        </a>

        <!-- 自定义确认弹窗组件 -->
        <div id="confirm-modal" class="modal-overlay">
            <div class="modal-box">
                <div class="modal-title" id="modal-title"></div>
                <div class="modal-desc" id="modal-desc"></div>
                <div class="modal-actions">
                    <button class="modal-btn modal-btn-cancel" id="modal-btn-cancel" onclick="closeModal()">取消</button>
                    <button class="modal-btn modal-btn-confirm" id="modal-btn-confirm" onclick="confirmAction()">确定</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 初始化页面配置文案与链接
        document.getElementById("page-title").innerText = siteConfig.pageTitle;
        document.getElementById("brand-link").href = siteConfig.homeUrl;
        document.getElementById("brand-link").innerText = siteConfig.brandName;
        document.getElementById("cta-card-link").href = siteConfig.ctaLink;
        document.getElementById("cta-card-text").innerHTML = siteConfig.ctaHtml;

        // 初始化弹窗文案
        document.getElementById("modal-title").innerText = siteConfig.confirmTitle;
        document.getElementById("modal-desc").innerText = siteConfig.confirmText;
        document.getElementById("modal-btn-cancel").innerText = siteConfig.btnCancelText;
        document.getElementById("modal-btn-confirm").innerText = siteConfig.btnConfirmText;

        var isAddressGenerated = false;

        function getRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
        function generatePhone() { return "+1-" + (Math.floor(Math.random() * 800) + 200) + "-" + (Math.floor(Math.random() * 900) + 100) + "-" + (Math.floor(Math.random() * 9000) + 1000); }

        function copyText(elementId, btnElement) {
            var text = document.getElementById(elementId).innerText;
            var textarea = document.createElement("textarea");
            textarea.value = text;
            textarea.style.position = 'fixed'; textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand("copy");
            document.body.removeChild(textarea);
            
            var oldText = btnElement.innerText;
            btnElement.innerText = "已复制";
            btnElement.classList.add("copied");
            setTimeout(function() { btnElement.innerText = oldText; btnElement.classList.remove("copied"); }, 1500);
        }

        function createRow(label, value, id) {
            return `<div class="info-row">
                <div class="info-content">
                    <div class="label">${label}</div>
                    <div class="value" id="${id}">${value}</div>
                </div>
                <button class="copy-btn" onclick="copyText('${id}', this)">复制</button>
            </div>`;
        }

        function renderAddress(data) {
            document.getElementById("output").innerHTML = 
                createRow("全名", data.fullName, "val-name") +
                createRow("街道", data.fullStreet, "val-street") +
                createRow("城市", data.cityName, "val-city") +
                createRow("州代号", data.stateCode, "val-state") +
                createRow("邮编", data.zipCode, "val-zip") +
                createRow("电话", data.phone, "val-phone");
            
            isAddressGenerated = true;
        }

        function handleGenerateClick() {
            if (isAddressGenerated) {
                // 显示自定义弹窗
                document.getElementById("confirm-modal").classList.add("active");
            } else {
                generateNewAddress();
            }
        }

        function closeModal() {
            document.getElementById("confirm-modal").classList.remove("active");
        }

        function confirmAction() {
            closeModal();
            generateNewAddress();
        }

        function generateNewAddress() {
            var stateObj = getRandom(siteConfig.taxFreeStates);
            var cityObj = getRandom(stateObj.cities);
            var addressData = {
                fullName: getRandom(siteConfig.firstNames) + ' ' + getRandom(siteConfig.lastNames),
                fullStreet: (Math.floor(Math.random() * 9000) + 100) + ' ' + getRandom(siteConfig.streetNames),
                cityName: cityObj.name,
                stateCode: stateObj.state,
                zipCode: cityObj.zip,
                phone: generatePhone()
            };
            try { localStorage.setItem('xiaowen_us_address_data', JSON.stringify(addressData)); } catch(e) {}
            renderAddress(addressData);
        }
        
        window.onload = function() {
            try {
                var savedData = localStorage.getItem('xiaowen_us_address_data');
                if (savedData) { renderAddress(JSON.parse(savedData)); } 
                else { generateNewAddress(); }
            } catch(e) { generateNewAddress(); }
        };
    </script>
</body>
</html>
