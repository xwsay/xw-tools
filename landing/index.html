<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>加载中...</title>
    <script src="./config.js"></script>
    <style>
        :root {
            --bg: #ffffff;
            --bg-alt: #fafafa;
            --text-main: #111111;
            --text-muted: #666666;
            --text-light: #999999;
            --border: #eaeaea;
            --nav-bg: rgba(255, 255, 255, 0.8);
            --accent: #111111;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --bg-alt: #0a0a0a;
                --text-main: #ededed;
                --text-muted: #888888;
                --text-light: #555555;
                --border: #222222;
                --nav-bg: rgba(0, 0, 0, 0.8);
                --accent: #ededed;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif; 
            background-color: var(--bg); color: var(--text-main); 
            line-height: 1.6; -webkit-font-smoothing: antialiased; 
        }

        .header {
            position: fixed; top: 0; left: 0; right: 0; height: 64px;
            background: var(--nav-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); z-index: 1000; display: flex; align-items: center;
        }
        .nav-container { 
            width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 2rem; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text-main); }
        .nav-avatar { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border); object-fit: cover; }
        .nav-name { font-weight: 600; font-size: 0.95rem; }
        .nav-link { font-size: 0.85rem; font-weight: 500; color: var(--text-main); text-decoration: none; transition: opacity 0.2s; }
        .nav-link:hover { opacity: 0.7; }

        .hero { max-width: 900px; margin: 160px auto 80px; padding: 0 2rem; text-align: center; }
        .hero-subtitle { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 1.5rem; display: block; }
        .hero-title { font-size: 4rem; font-weight: 800; letter-spacing: -2px; line-height: 1.1; margin-bottom: 1.5rem; }
        .hero-desc { font-size: 1.2rem; color: var(--text-muted); max-width: 620px; margin: 0 auto 3rem; }

        .primary-cta-card {
            max-width: 800px; margin: 0 auto 100px; padding: 4rem 2rem;
            background: var(--accent); color: var(--bg);
            border-radius: 24px; text-align: center; text-decoration: none;
            display: block; transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .primary-cta-card:hover { transform: scale(1.02); }
        .cta-label { font-size: 0.75rem; font-weight: 700; opacity: 0.6; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 1.5rem; display: block; }
        .cta-title { font-size: 2.2rem; font-weight: 800; margin-bottom: 1rem; }
        .cta-btn-text { font-size: 1.1rem; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; }

        .features { padding: 6rem 0; border-top: 1px solid var(--border); }
        .grid-container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 4rem; }
        .feature-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 1rem; }
        .feature-desc { font-size: 0.95rem; color: var(--text-muted); line-height: 1.7; }

        .assurance-section { background: var(--bg-alt); padding: 8rem 0; border-top: 1px solid var(--border); }
        .assurance-content { max-width: 700px; margin: 0 auto; padding: 0 2rem; }
        .assurance-title { font-size: 2.2rem; font-weight: 800; margin-bottom: 3rem; text-align: center; }
        
        .assurance-grid { display: grid; grid-template-columns: 1fr; gap: 2rem; text-align: left; }
        @media (min-width: 768px) { .assurance-grid { grid-template-columns: 1fr 1fr; } }

        .ass-card { padding: 2rem; border-radius: 16px; border: 1px solid var(--border); background: var(--bg); }
        .ass-label { font-size: 0.75rem; font-weight: 700; color: var(--text-light); text-transform: uppercase; margin-bottom: 1rem; display: block; }
        .ass-value { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; display: block; }
        .ass-inst { font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; }
        
        .email-action { display: inline-block; margin-top: 1.2rem; font-size: 0.85rem; font-weight: 600; color: var(--text-main); text-decoration: underline; }

        .footer { max-width: 1200px; margin: 0 auto; padding: 4rem 2rem; display: flex; flex-direction: column; align-items: center; gap: 1rem; color: var(--text-light); font-size: 0.85rem; }

        @media (max-width: 768px) {
            .hero-title { font-size: 2.8rem; }
            .hero { margin: 120px auto 60px; }
            .primary-cta-card { margin: 0 1.5rem 80px; padding: 3rem 1.5rem; }
            .cta-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="nav-container">
            <a href="/" class="nav-brand">
                <img id="nav-avatar" src="" alt="" class="nav-avatar">
                <span id="nav-name" class="nav-name"></span>
            </a>
            <a id="nav-action" href="#" target="_blank" class="nav-link"></a>
        </div>
    </header>

    <main>
        <section class="hero">
            <span id="hero-subtitle" class="hero-subtitle"></span>
            <h1 id="hero-title" class="hero-title"></h1>
            <p id="hero-desc" class="hero-desc"></p>
        </section>

        <a id="main-cta-link" href="#" target="_blank" class="primary-cta-card">
            <span class="cta-label">Core Destination</span>
            <div id="cta-title" class="cta-title"></div>
            <div class="cta-btn-text">
                <span id="cta-btn-label"></span>
                <span>→</span>
            </div>
        </a>

        <section class="features">
            <div id="features-grid" class="grid-container"></div>
        </section>

        <section class="assurance-section">
            <div class="assurance-content">
                <h2 id="ass-title" class="assurance-title"></h2>
                <div class="assurance-grid">
                    <div class="ass-card">
                        <span class="ass-label">Stay Connected</span>
                        <span id="ass-follow" class="ass-value"></span>
                        <p class="ass-inst">实时获取最新教程动态、技术分享及防失联网址分发。</p>
                    </div>
                    <div class="ass-card">
                        <span class="ass-label">Backup Channel</span>
                        <span id="ass-email-desc" class="ass-value"></span>
                        <p id="ass-email-inst" class="ass-inst"></p>
                        <a id="email-btn" href="#" class="email-action">立即发送邮件获取 →</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div id="footer-copyright"></div>
        <div id="footer-contact"></div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.title = siteConfig.seo.title;
            document.getElementById('nav-avatar').src = siteConfig.nav.avatar;
            document.getElementById('nav-name').innerText = siteConfig.nav.brandName;
            document.getElementById('nav-action').innerText = siteConfig.nav.actionText;
            document.getElementById('nav-action').href = siteConfig.nav.actionLink;

            document.getElementById('hero-subtitle').innerText = siteConfig.hero.subtitle;
            document.getElementById('hero-title').innerText = siteConfig.hero.title;
            document.getElementById('hero-desc').innerText = siteConfig.hero.desc;

            document.getElementById('main-cta-link').href = siteConfig.hero.primaryLink;
            document.getElementById('cta-title').innerText = "最新教程中心";
            document.getElementById('cta-btn-label').innerText = siteConfig.hero.primaryBtn;

            const fGrid = document.getElementById('features-grid');
            siteConfig.features.forEach(f => {
                fGrid.innerHTML += `<div class="feature-item"><h3 class="feature-title">${f.title}</h3><p class="feature-desc">${f.desc}</p></div>`;
            });

            document.getElementById('ass-title').innerText = siteConfig.assurance.title;
            document.getElementById('ass-follow').innerText = siteConfig.assurance.followText;
            document.getElementById('ass-email-desc').innerText = siteConfig.assurance.email;
            document.getElementById('ass-email-inst').innerText = siteConfig.assurance.emailInst;
            document.getElementById('email-btn').href = `mailto:${siteConfig.assurance.email}?subject=${encodeURIComponent(siteConfig.assurance.emailSubject)}`;

            document.getElementById('footer-copyright').innerText = siteConfig.footer.copyright;
            document.getElementById('footer-contact').innerText = siteConfig.footer.contact;
        });
    </script>
</body>
</html>
