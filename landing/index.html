<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>加载中...</title>
    <script src="./config.js"></script>
    <style>
        :root {
            --bg: #ffffff;
            --bg-alt: #fafafa;
            --text-main: #111111;
            --text-muted: #666666;
            --text-light: #999999;
            --border: #eaeaea;
            --nav-bg: rgba(255, 255, 255, 0.8);
            --card-hover: #f5f5f5;
            --btn-primary-bg: #111111;
            --btn-primary-text: #ffffff;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --bg-alt: #0a0a0a;
                --text-main: #ededed;
                --text-muted: #888888;
                --text-light: #555555;
                --border: #222222;
                --nav-bg: rgba(0, 0, 0, 0.8);
                --card-hover: #111111;
                --btn-primary-bg: #ededed;
                --btn-primary-text: #000000;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif; 
            background-color: var(--bg); color: var(--text-main); 
            line-height: 1.6; -webkit-font-smoothing: antialiased; 
        }

        /* 导航栏 */
        .header {
            position: fixed; top: 0; left: 0; right: 0; height: 64px;
            background: var(--nav-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); z-index: 1000; display: flex; align-items: center;
        }
        .nav-container { 
            width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 2rem; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text-main); }
        .nav-avatar { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border); object-fit: cover; }
        .nav-name { font-weight: 600; font-size: 0.95rem; }
        .nav-link { font-size: 0.85rem; font-weight: 500; color: var(--text-main); text-decoration: none; transition: opacity 0.2s; }
        .nav-link:hover { opacity: 0.7; }

        /* 首屏 Hero */
        .hero { max-width: 900px; margin: 160px auto 100px; padding: 0 2rem; text-align: center; }
        .hero-subtitle { font-size: 0.9rem; font-weight: 600; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 1.5rem; display: block; }
        .hero-title { font-size: 4rem; font-weight: 800; letter-spacing: -1.5px; line-height: 1.1; margin-bottom: 1.5rem; }
        .hero-desc { font-size: 1.2rem; color: var(--text-muted); max-width: 600px; margin: 0 auto 3rem; }
        .hero-actions { display: flex; gap: 1rem; justify-content: center; }
        .btn { padding: 0.9rem 2rem; border-radius: 8px; font-size: 0.95rem; font-weight: 500; text-decoration: none; transition: all 0.2s; }
        .btn-primary { background: var(--btn-primary-bg); color: var(--btn-primary-text); }
        .btn-primary:hover { transform: translateY(-1px); opacity: 0.9; }
        .btn-secondary { background: transparent; color: var(--text-main); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--bg-alt); }

        /* 特性网格 Features */
        .features { background: var(--bg-alt); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 6rem 0; }
        .grid-container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 3rem; }
        .feature-item { padding: 1rem 0; }
        .feature-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 1rem; color: var(--text-main); }
        .feature-desc { font-size: 0.95rem; color: var(--text-muted); line-height: 1.7; }

        /* 核心资源 Showcase */
        .showcase { max-width: 1200px; margin: 8rem auto; padding: 0 2rem; }
        .section-title { font-size: 2rem; font-weight: 700; margin-bottom: 3rem; text-align: center; letter-spacing: -0.5px; }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 2rem; }
        .card { display: block; padding: 3rem; border: 1px solid var(--border); border-radius: 16px; text-decoration: none; background: var(--bg); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { border-color: var(--text-muted); transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.04); }
        .card-tag { font-size: 0.75rem; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 1.5rem; display: block; }
        .card-title { font-size: 1.5rem; font-weight: 700; color: var(--text-main); margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .card-title span:last-child { font-weight: 400; color: var(--text-muted); transition: transform 0.2s; }
        .card:hover .card-title span:last-child { transform: translateX(4px); color: var(--text-main); }
        .card-desc { font-size: 1rem; color: var(--text-muted); }

        /* 页脚 Footer */
        .footer { max-width: 1200px; margin: 0 auto; padding: 4rem 2rem; border-top: 1px solid var(--border); display: flex; flex-direction: column; md:flex-row; justify-content: space-between; align-items: center; gap: 1rem; color: var(--text-muted); font-size: 0.85rem; }
        .footer-links { display: flex; gap: 2rem; }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .hero { margin: 120px auto 60px; }
            .hero-title { font-size: 2.8rem; }
            .hero-desc { font-size: 1.05rem; }
            .hero-actions { flex-direction: column; width: 100%; max-width: 300px; margin: 0 auto; }
            .btn { text-align: center; }
            .cards-grid { grid-template-columns: 1fr; }
            .card { padding: 2rem; }
            .footer { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="nav-container">
            <a href="/" class="nav-brand">
                <img id="nav-avatar" src="" alt="Avatar" class="nav-avatar">
                <span id="nav-name" class="nav-name"></span>
            </a>
            <a id="nav-action" href="#" target="_blank" class="nav-link"></a>
        </div>
    </header>

    <main>
        <section class="hero">
            <span id="hero-subtitle" class="hero-subtitle"></span>
            <h1 id="hero-title" class="hero-title"></h1>
            <p id="hero-desc" class="hero-desc"></p>
            <div class="hero-actions">
                <a id="btn-primary" href="#" target="_blank" class="btn btn-primary"></a>
                <a id="btn-secondary" href="#features" class="btn btn-secondary"></a>
            </div>
        </section>

        <section id="features" class="features">
            <div id="features-grid" class="grid-container">
                </div>
        </section>

        <section class="showcase">
            <h2 id="showcase-title" class="section-title"></h2>
            <div id="cards-grid" class="cards-grid">
                </div>
        </section>
    </main>

    <footer class="footer">
        <div id="footer-copyright"></div>
        <div class="footer-links">
            <span id="footer-contact"></span>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 基础配置渲染
            document.title = siteConfig.seo.title;
            document.getElementById('nav-avatar').src = siteConfig.nav.avatar;
            document.getElementById('nav-name').innerText = siteConfig.nav.brandName;
            document.getElementById('nav-action').innerText = siteConfig.nav.actionText;
            document.getElementById('nav-action').href = siteConfig.nav.actionLink;

            // 首屏渲染
            document.getElementById('hero-title').innerText = siteConfig.hero.title;
            document.getElementById('hero-subtitle').innerText = siteConfig.hero.subtitle;
            document.getElementById('hero-desc').innerText = siteConfig.hero.desc;
            document.getElementById('btn-primary').innerText = siteConfig.hero.primaryBtn;
            document.getElementById('btn-primary').href = siteConfig.hero.primaryLink;
            document.getElementById('btn-secondary').innerText = siteConfig.hero.secondaryBtn;

            // 动态生成特性网格
            const featuresContainer = document.getElementById('features-grid');
            siteConfig.features.forEach(feature => {
                const featureHTML = `
                    <div class="feature-item">
                        <h3 class="feature-title">${feature.title}</h3>
                        <p class="feature-desc">${feature.desc}</p>
                    </div>
                `;
                featuresContainer.innerHTML += featureHTML;
            });

            // 动态生成资源卡片
            document.getElementById('showcase-title').innerText = siteConfig.showcase.sectionTitle;
            const cardsContainer = document.getElementById('cards-grid');
            siteConfig.showcase.cards.forEach(card => {
                const cardHTML = `
                    <a href="${card.link}" target="_blank" class="card">
                        <span class="card-tag">${card.tag}</span>
                        <div class="card-title">
                            <span>${card.title}</span>
                            <span>→</span>
                        </div>
                        <p class="card-desc">${card.desc}</p>
                    </a>
                `;
                cardsContainer.innerHTML += cardHTML;
            });

            // 页脚渲染
            document.getElementById('footer-copyright').innerText = siteConfig.footer.copyright;
            document.getElementById('footer-contact').innerText = siteConfig.footer.contact;
        });
    </script>
</body>
</html>
