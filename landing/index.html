<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>加载中...</title>
    <!-- 引入外部配置文件 -->
    <script src="./config.js"></script>
    <style>
        /* ---------------------------------------------------------
           [底座样式区] - 负责 UI 设计，如无 UI 修改需求请勿动
        ---------------------------------------------------------- */
        :root {
            --bg: #ffffff;
            --bg-alt: #f8f9fa;
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --accent: #0071e3; /* 科技蓝 */
            --border: #d2d2d7;
            --card-bg: #ffffff;
            --nav-bg: rgba(255, 255, 255, 0.72);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --bg-alt: #161617;
                --text-main: #f5f5f7;
                --text-muted: #a1a1a6;
                --accent: #2997ff;
                --border: #424245;
                --card-bg: #1c1c1e;
                --nav-bg: rgba(0, 0, 0, 0.72);
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif; 
            background-color: var(--bg); color: var(--text-main); 
            line-height: 1.47; -webkit-font-smoothing: antialiased; 
        }

        /* 导航栏设计 */
        .header {
            position: fixed; top: 0; left: 0; right: 0; height: 52px;
            background: var(--nav-bg); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--border); z-index: 1000; display: flex; align-items: center;
        }
        .nav-container { 
            width: 100%; max-width: 1000px; margin: 0 auto; padding: 0 22px; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .nav-brand { display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--text-main); }
        .nav-avatar { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; }
        .nav-name { font-weight: 500; font-size: 14px; letter-spacing: -0.01em; }
        .nav-link { font-size: 12px; color: var(--text-main); text-decoration: none; opacity: 0.8; transition: opacity 0.2s; }
        .nav-link:hover { opacity: 1; color: var(--accent); }

        /* Hero 视觉区 */
        .hero { max-width: 800px; margin: 120px auto 60px; padding: 0 22px; text-align: center; }
        .hero-subtitle { font-size: 17px; font-weight: 600; color: var(--accent); margin-bottom: 12px; display: block; }
        .hero-title { font-size: 56px; font-weight: 700; letter-spacing: -0.015em; line-height: 1.07; margin-bottom: 18px; }
        .hero-desc { font-size: 21px; color: var(--text-muted); max-width: 600px; margin: 0 auto 40px; font-weight: 400; }

        /* 主入口卡片升级版 */
        .primary-cta-card {
            max-width: 600px; margin: 0 auto 100px; padding: 32px;
            background: var(--accent); color: #ffffff;
            border-radius: 18px; text-align: center; text-decoration: none;
            display: block; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0, 113, 227, 0.3);
        }
        .primary-cta-card:hover { transform: scale(1.02); box-shadow: 0 15px 40px rgba(0, 113, 227, 0.4); }
        .cta-title { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
        .cta-btn-text { font-size: 16px; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 6px; opacity: 0.9; }

        /* 特性展示区 */
        .features { padding: 80px 0; background: var(--bg-alt); border-top: 1px solid var(--border); }
        .grid-container { max-width: 1000px; margin: 0 auto; padding: 0 22px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .feature-item { padding: 40px; background: var(--card-bg); border-radius: 20px; border: 1px solid var(--border); transition: transform 0.3s; }
        .feature-item:hover { transform: translateY(-5px); }
        .feature-title { font-size: 24px; font-weight: 600; margin-bottom: 15px; letter-spacing: -0.01em; }
        .feature-desc { font-size: 17px; color: var(--text-muted); line-height: 1.47; }

        /* 页脚 */
        .footer { max-width: 1000px; margin: 0 auto; padding: 60px 22px; text-align: center; color: var(--text-muted); font-size: 12px; }

        @media (max-width: 768px) {
            .hero-title { font-size: 40px; }
            .hero-desc { font-size: 18px; }
            .hero { margin: 100px auto 40px; }
            .primary-cta-card { margin: 0 22px 60px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="nav-container">
            <a href="/" class="nav-brand">
                <img id="nav-avatar" src="" alt="" class="nav-avatar">
                <span id="nav-name" class="nav-name"></span>
            </a>
            <a id="nav-action" href="#" target="_blank" class="nav-link"></a>
        </div>
    </header>

    <main>
        <section class="hero">
            <span id="hero-subtitle" class="hero-subtitle"></span>
            <h1 id="hero-title" class="hero-title"></h1>
            <p id="hero-desc" class="hero-desc"></p>
        </section>

        <a id="main-cta-link" href="#" target="_blank" class="primary-cta-card">
            <div id="cta-title" class="cta-title"></div>
            <div class="cta-btn-text">
                <span id="cta-btn-label"></span>
                <span>→</span>
            </div>
        </a>

        <section class="features">
            <div id="features-grid" class="grid-container"></div>
        </section>
    </main>

    <footer class="footer">
        <div id="footer-copyright"></div>
        <div id="footer-contact" style="margin-top: 8px;"></div>
    </footer>

    <script>
        /* ---------------------------------------------------------
           [渲染逻辑区] - 自动将配置文件填入页面，请勿动
        ---------------------------------------------------------- */
        document.addEventListener('DOMContentLoaded', () => {
            // 设置 SEO
            document.title = siteConfig.seo.title;
            const metaDesc = document.createElement('meta');
            metaDesc.name = "description";
            metaDesc.content = siteConfig.seo.description;
            document.head.appendChild(metaDesc);

            // 动态设置网站 Icon
            let link = document.querySelector("link[rel~='icon']");
            if (!link) {
                link = document.createElement('link');
                link.rel = 'icon';
                document.head.appendChild(link);
            }
            link.href = siteConfig.seo.icon;

            // 导航栏
            document.getElementById('nav-avatar').src = siteConfig.nav.avatar;
            document.getElementById('nav-name').innerText = siteConfig.nav.brandName;
            document.getElementById('nav-action').innerText = siteConfig.nav.actionText;
            document.getElementById('nav-action').href = siteConfig.nav.actionLink;

            // Hero 区
            document.getElementById('hero-subtitle').innerText = siteConfig.hero.subtitle;
            document.getElementById('hero-title').innerText = siteConfig.hero.title;
            document.getElementById('hero-desc').innerText = siteConfig.hero.desc;

            // 主入口
            document.getElementById('main-cta-link').href = siteConfig.hero.primaryLink;
            document.getElementById('cta-title').innerText = siteConfig.hero.primaryBtn;
            document.getElementById('cta-btn-label').innerText = "教程即刻开启";

            // 特性列表
            const fGrid = document.getElementById('features-grid');
            fGrid.innerHTML = ''; // 清空原有内容，防止重复加载
            siteConfig.features.forEach(f => {
                const item = document.createElement('div');
                item.className = 'feature-item';
                item.innerHTML = `<h3 class="feature-title">${f.title}</h3><p class="feature-desc">${f.desc}</p>`;
                fGrid.appendChild(item);
            });

            // 页脚
            document.getElementById('footer-copyright').innerText = siteConfig.footer.copyright;
            document.getElementById('footer-contact').innerText = siteConfig.footer.contact;
        });
    </script>
</body>
</html>
