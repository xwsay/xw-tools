<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="canonical" href="https://www.xwsay.com/" />
    <title>加载中...</title>
    
    <script src="./config.js"></script>

    <style>
        /* 极简黑白主题变量 */
        :root {
            --bg: #ffffff;
            --text-main: #111111;
            --text-muted: #666666;
            --border: #eaeaea;
            --border-hover: #cccccc;
            --card-bg: #ffffff;
            --card-hover: #fafafa;
            --btn-bg: #111111;
            --btn-text: #ffffff;
            --toast-bg: #111111;
            --toast-text: #ffffff;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0a0a0a;
                --text-main: #ededed;
                --text-muted: #888888;
                --border: #222222;
                --border-hover: #444444;
                --card-bg: #0a0a0a;
                --card-hover: #111111;
                --btn-bg: #ededed;
                --btn-text: #0a0a0a;
                --toast-bg: #ededed;
                --toast-text: #0a0a0a;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif; 
            background-color: var(--bg); 
            color: var(--text-main); 
            line-height: 1.6;
            -webkit-font-smoothing: antialiased; 
        }

        /* 顶部导航 */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            max-width: 800px;
            margin: 0 auto;
        }
        .nav-brand { display: flex; align-items: center; gap: 12px; }
        .nav-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); }
        .nav-name { font-weight: 600; font-size: 1rem; letter-spacing: -0.2px; }
        .nav-link { 
            font-size: 0.85rem; font-weight: 500; color: var(--text-main); text-decoration: none; 
            padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: 6px; transition: all 0.2s;
        }
        .nav-link:hover { background: var(--card-hover); border-color: var(--border-hover); }

        /* 主体内容区 */
        .container {
            max-width: 800px;
            margin: 4rem auto;
            padding: 0 2rem;
        }

        /* 头部介绍 */
        .header-section { margin-bottom: 4rem; }
        h1 { font-size: 2.5rem; font-weight: 700; letter-spacing: -1px; margin-bottom: 1rem; line-height: 1.2; }
        .bio { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 2rem; max-width: 600px; }
        .btn-bookmark {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 0.75rem 1.5rem; font-size: 0.9rem; font-weight: 500; cursor: pointer;
            background: var(--btn-bg); color: var(--btn-text); border: none; border-radius: 6px;
            transition: opacity 0.2s;
        }
        .btn-bookmark:hover { opacity: 0.9; }

        /* 分割线 */
        hr { border: none; border-top: 1px solid var(--border); margin: 3rem 0; }

        /* 防失联模块 */
        .section-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 1.5rem; letter-spacing: -0.5px; }
        .anti-lost-container {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 2rem;
            background: var(--card-bg);
        }
        .al-desc { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 2rem; }
        
        .al-grid { display: grid; grid-template-columns: 1fr; gap: 1.5rem; }
        @media (min-width: 600px) { .al-grid { grid-template-columns: 1fr 1fr; } }
        
        .al-item { display: flex; flex-direction: column; gap: 0.5rem; }
        .al-label { font-size: 0.85rem; font-weight: 600; color: var(--text-main); text-transform: uppercase; letter-spacing: 0.5px; }
        .al-value { 
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.95rem; color: var(--text-main); text-decoration: none;
            padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: 6px;
            background: var(--card-hover); transition: border-color 0.2s;
        }
        .al-value:hover { border-color: var(--border-hover); }
        .al-hint { font-size: 0.8rem; color: var(--text-muted); }

        /* 链接列表 */
        .links-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; margin-top: 1.5rem; }
        @media (min-width: 600px) { .links-grid { grid-template-columns: 1fr 1fr; } }
        
        .link-card {
            display: flex; flex-direction: column; padding: 1.5rem;
            border: 1px solid var(--border); border-radius: 8px; text-decoration: none;
            background: var(--card-bg); transition: all 0.2s;
        }
        .link-card:hover { border-color: var(--border-hover); background: var(--card-hover); transform: translateY(-1px); }
        .link-title { font-size: 1rem; font-weight: 600; color: var(--text-main); margin-bottom: 0.5rem; }
        .link-desc { font-size: 0.85rem; color: var(--text-muted); }

        /* 底部 */
        footer { margin-top: 5rem; padding-bottom: 3rem; text-align: left; font-size: 0.85rem; color: var(--text-muted); display: flex; flex-direction: column; gap: 0.5rem; }
        .contact-link { color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
        .contact-link:hover { color: var(--text-main); }

        /* Toast 提示 */
        .toast {
            position: fixed; bottom: 2rem; right: 2rem;
            background: var(--toast-bg); color: var(--toast-text);
            padding: 1rem 1.5rem; border-radius: 6px; font-size: 0.9rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            opacity: 0; transform: translateY(10px); pointer-events: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 999;
        }
        .toast.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <img id="nav-avatar" src="" alt="Avatar" class="nav-avatar">
            <span id="nav-name" class="nav-name"></span>
        </div>
        <a id="blog-link" href="#" target="_blank" class="nav-link"></a>
    </nav>

    <main class="container">
        <section class="header-section">
            <h1 id="main-title">消除技术门槛</h1>
            <p id="bio" class="bio"></p>
            <button id="bookmark-btn" class="btn-bookmark"></button>
        </section>

        <section>
            <h2 id="al-title" class="section-title"></h2>
            <div class="anti-lost-container">
                <p id="al-desc" class="al-desc"></p>
                <div class="al-grid">
                    <div class="al-item">
                        <span class="al-label">发送邮件</span>
                        <a id="al-email-link" href="#" class="al-value"></a>
                        <span id="al-email-hint" class="al-hint"></span>
                    </div>
                    <div class="al-item">
                        <span id="al-tg-title" class="al-label"></span>
                        <a id="al-tg-link" href="#" target="_blank" class="al-value" style="display: flex; justify-content: space-between;">
                            <span>订阅频道</span>
                            <span>↗</span>
                        </a>
                        <span class="al-hint">获取实时更新与通知</span>
                    </div>
                </div>
            </div>
        </section>

        <hr>

        <section>
            <h2 class="section-title">资源与工具</h2>
            <div id="links-wrapper" class="links-grid"></div>
        </section>

        <footer id="footer-container">
            <a id="email-link" href="#" class="contact-link"></a>
            <span id="footer-text"></span>
        </footer>
    </main>

    <div id="toast" class="toast"><span id="toast-msg"></span></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            try {
                // 读取 config.js 中的数据渲染页面
                document.title = siteConfig.seo.title;
                const descMeta = document.querySelector('meta[name="description"]');
                if (!descMeta) {
                    const meta = document.createElement('meta');
                    meta.name = "description";
                    meta.content = siteConfig.seo.description;
                    document.head.appendChild(meta);
                }
                
                document.getElementById('nav-avatar').src = siteConfig.profile.avatar;
                document.getElementById('nav-name').innerText = siteConfig.profile.name;
                document.getElementById('blog-link').href = siteConfig.blogLink.link;
                document.getElementById('blog-link').innerText = siteConfig.blogLink.text;

                document.getElementById('bio').innerText = siteConfig.profile.bio;
                document.getElementById('bookmark-btn').innerText = siteConfig.profile.bookmarkBtn;

                document.getElementById('al-title').innerText = siteConfig.antiLost.title;
                document.getElementById('al-desc').innerText = siteConfig.antiLost.desc;
                document.getElementById('al-email-link').innerText = siteConfig.antiLost.email;
                document.getElementById('al-email-link').href = `mailto:${siteConfig.antiLost.email}?subject=获取地址`;
                document.getElementById('al-email-hint').innerText = siteConfig.antiLost.emailSubject;
                document.getElementById('al-tg-title').innerText = siteConfig.antiLost.telegramTitle;
                document.getElementById('al-tg-link').href = siteConfig.antiLost.telegramLink;

                document.getElementById('links-wrapper').innerHTML = siteConfig.urls.map(item => `
                    <a href="${item.link}" target="_blank" class="link-card">
                        <div class="link-title">${item.title}</div>
                        <div class="link-desc">${item.desc}</div>
                    </a>
                `).join('');

                document.getElementById('email-link').href = 'mailto:' + siteConfig.contact.email;
                document.getElementById('email-link').innerText = siteConfig.contact.text;
                document.getElementById('footer-text').innerText = siteConfig.footer;

                const feedbackScript = document.createElement('script');
                feedbackScript.src = "https://feedback.xwsay.dpdns.org/widget.js";
                feedbackScript.defer = true;
                document.head.appendChild(feedbackScript);

            } catch (e) { console.error("配置加载错误:", e); }

            const bBtn = document.getElementById('bookmark-btn');
            const toast = document.getElementById('toast');
            if(bBtn) {
                bBtn.addEventListener('click', () => {
                    navigator.clipboard.writeText(window.location.href).catch(()=>{});
                    const isMac = /Mac/i.test(navigator.userAgent);
                    document.getElementById('toast-msg').innerHTML = `主页链接已复制。按 <strong>${isMac ? '⌘ + D' : 'Ctrl + D'}</strong> 收藏本页。`;
                    toast.classList.add('show');
                    setTimeout(() => toast.classList.remove('show'), 3500);
                });
            }
        });
    </script>
</body>
</html>
