<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="canonical" href="https://www.xwsay.com/" />
    <title>加载中...</title>
    <script src="./config.js"></script>
    <style>
        :root {
            --bg: #ffffff;
            --text-main: #111111;
            --text-muted: #666666;
            --border: #eaeaea;
            --nav-bg: rgba(255, 255, 255, 0.7);
            --card-hover: #fafafa;
            --warn-text: #b45309;
            --warn-bg: rgba(217, 119, 6, 0.05);
            --warn-border: rgba(217, 119, 6, 0.1);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0a0a0a;
                --text-main: #ededed;
                --text-muted: #888888;
                --border: #222222;
                --nav-bg: rgba(10, 10, 10, 0.7);
                --card-hover: #111111;
                --warn-text: #fbbf24;
                --warn-bg: rgba(251, 191, 36, 0.05);
                --warn-border: rgba(251, 191, 36, 0.1);
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif; 
            background-color: var(--bg); 
            color: var(--text-main); 
            line-height: 1.6;
            -webkit-font-smoothing: antialiased; 
        }

        .header {
            position: fixed; top: 0; left: 0; right: 0; height: 64px;
            background: var(--nav-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); z-index: 1000; display: flex; align-items: center;
        }
        
        .nav-container { 
            width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 2rem; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        
        .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text-main); }
        .nav-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); }
        .nav-name { font-weight: 600; font-size: 0.95rem; }
        .nav-link { font-size: 0.85rem; font-weight: 500; color: var(--text-main); text-decoration: none; transition: opacity 0.2s; }
        .nav-link:hover { opacity: 0.7; }

        .main { max-width: 800px; margin: 100px auto 4rem; padding: 0 1.5rem; }
        .profile-section { margin-bottom: 4rem; }
        h1 { font-size: 2.2rem; font-weight: 700; letter-spacing: -1px; margin-bottom: 0.5rem; }
        .bio { font-size: 1.05rem; color: var(--text-muted); }
        
        .btn-bookmark { 
            display: inline-block; margin-top: 1.5rem; padding: 0.8rem 1.5rem; font-size: 0.9rem; 
            font-weight: 500; cursor: pointer; background: var(--text-main); color: var(--bg); 
            border: none; border-radius: 8px; transition: opacity 0.2s; 
        }
        .btn-bookmark:hover { opacity: 0.9; }

        .tutorial-card {
            display: block; padding: 2.5rem; border: 1px solid var(--border); border-radius: 12px;
            text-decoration: none; background: var(--bg); transition: all 0.2s; margin-bottom: 3rem;
        }
        .tutorial-card:hover { border-color: var(--text-main); background: var(--card-hover); transform: translateY(-2px); }
        .tut-label { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 1rem; display: block; }
        .tut-title { font-size: 1.5rem; font-weight: 700; color: var(--text-main); margin-bottom: 0.8rem; display: flex; justify-content: space-between; }
        .tut-desc { font-size: 1rem; color: var(--text-muted); margin-bottom: 1.5rem; }
        
        .tut-warning {
            font-size: 0.85rem; color: var(--warn-text); background: var(--warn-bg);
            padding: 0.8rem 1rem; border-radius: 6px; border: 1px solid var(--warn-border);
            display: flex; align-items: flex-start; gap: 8px; line-height: 1.4;
        }

        .backup-section { border-top: 1px solid var(--border); padding-top: 3rem; }
        .section-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 1.5rem; }
        .al-desc { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 1.5rem; }
        
        .al-box { display: flex; flex-direction: column; max-width: 400px; }
        
        .email-link {
            font-family: ui-monospace, SFMono-Regular, monospace; font-size: 0.95rem; color: var(--text-main); text-decoration: none;
            padding: 0.8rem 1.2rem; border: 1px solid var(--border); border-radius: 8px;
            background: var(--card-hover); display: flex; justify-content: space-between; align-items: center; transition: border-color 0.2s;
        }
        .email-link:hover { border-color: var(--border-hover); }
        .email-link::after { content: "↗"; color: var(--text-muted); font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-weight: 400; }

        footer { margin-top: 6rem; padding-bottom: 3rem; font-size: 0.85rem; color: var(--text-muted); }
        .footer-info { margin-bottom: 0.5rem; }

        .toast {
            position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
            background: var(--text-main); color: var(--bg); padding: 0.8rem 1.5rem; border-radius: 8px; font-size: 0.9rem;
            opacity: 0; pointer-events: none; transition: all 0.3s; z-index: 2000;
        }
        .toast.show { opacity: 1; }

        /* 移动端专属适配 */
        @media (max-width: 600px) {
            .nav-container { padding: 0 1.2rem; }
            .main { margin-top: 80px; padding: 0 1.2rem; }
            h1 { font-size: 1.8rem; }
            .bio { font-size: 0.95rem; }
            .tutorial-card { padding: 1.5rem; }
            .tut-title { font-size: 1.25rem; }
            .tut-desc { font-size: 0.9rem; }
            .tut-warning { font-size: 0.8rem; flex-direction: column; align-items: flex-start; gap: 4px; padding: 0.6rem 0.8rem; }
            .email-link { font-size: 0.85rem; padding: 0.8rem 1rem; }
            .toast { width: 90%; text-align: center; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="nav-container">
            <a href="/" class="nav-brand">
                <img id="nav-avatar" src="" alt="" class="nav-avatar">
                <span id="nav-name" class="nav-name"></span>
            </a>
            <a id="blog-link" href="#" target="_blank" class="nav-link"></a>
        </div>
    </header>

    <main class="main">
        <section class="profile-section">
            <h1 id="main-title">消除技术门槛</h1>
            <p id="bio" class="bio"></p>
            <button id="bookmark-btn" class="btn-bookmark"></button>
        </section>

        <a id="tut-link" href="#" target="_blank" class="tutorial-card">
            <span class="tut-label">Primary Resource</span>
            <div class="tut-title">
                <span id="tut-title"></span>
                <span>→</span>
            </div>
            <p id="tut-desc" class="tut-desc"></p>
            <div id="tut-warning" class="tut-warning"></div>
        </a>

        <section class="backup-section">
            <h2 id="al-title" class="section-title"></h2>
            <p id="al-desc" class="al-desc"></p>
            <div class="al-box">
                <a id="al-email" href="#" class="email-link"></a>
            </div>
        </section>

        <footer>
            <div id="contact-text" class="footer-info"></div>
            <div id="footer-text"></div>
        </footer>
    </main>

    <div id="toast" class="toast"><span id="toast-msg"></span></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            try {
                document.title = siteConfig.seo.title;
                document.getElementById('nav-avatar').src = siteConfig.profile.avatar;
                document.getElementById('nav-name').innerText = siteConfig.profile.name;
                document.getElementById('blog-link').href = siteConfig.nav.blogLink;
                document.getElementById('blog-link').innerText = siteConfig.nav.blogText;

                document.getElementById('bio').innerText = siteConfig.profile.bio;
                document.getElementById('bookmark-btn').innerText = siteConfig.antiLost.btnText;
                
                document.getElementById('tut-link').href = siteConfig.tutorial.link;
                document.getElementById('tut-title').innerText = siteConfig.tutorial.title;
                document.getElementById('tut-desc').innerText = siteConfig.tutorial.desc;
                document.getElementById('tut-warning').innerText = siteConfig.tutorial.warning;

                document.getElementById('al-title').innerText = siteConfig.antiLost.title;
                document.getElementById('al-desc').innerText = siteConfig.antiLost.desc;
                
                document.getElementById('al-email').innerText = "发邮件至： " + siteConfig.antiLost.email;
                document.getElementById('al-email').href = `mailto:${siteConfig.antiLost.email}?subject=${encodeURIComponent(siteConfig.antiLost.emailSubject)}`;

                document.getElementById('contact-text').innerText = siteConfig.contactText;
                document.getElementById('footer-text').innerText = siteConfig.footer;

                const feedbackScript = document.createElement('script');
                feedbackScript.src = "https://feedback.xwsay.dpdns.org/widget.js";
                feedbackScript.defer = true;
                document.head.appendChild(feedbackScript);
            } catch (e) { console.error(e); }

            const bBtn = document.getElementById('bookmark-btn');
            const toast = document.getElementById('toast');
            if(bBtn) {
                bBtn.addEventListener('click', () => {
                    navigator.clipboard.writeText(window.location.href).catch(()=>{});
                    document.getElementById('toast-msg').innerHTML = `本页链接已复制。请按 <strong>⌘+D</strong> 收藏防走失。`;
                    toast.classList.add('show');
                    setTimeout(() => toast.classList.remove('show'), 3000);
                });
            }
        });
    </script>
</body>
</html>
